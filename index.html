<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nexus ERP</title>
<link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json" />
  <script src="vendor/qrcode.min.js" onerror="this.src='https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js'"></script>
  <script src="vendor/jspdf.umd.min.js" onerror="this.src='https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js'"></script>
</head>
<body>
<!-- ===== App Lock ===== -->
<div id="lockOverlay" class="login-overlay hidden">
  <div class="login-card">
    <div class="login-logo">Nexus<span>ERP</span></div>
    <div class="login-sub" id="lockSub">الرجاء إدخال رمز القفل</div>
    <input id="lockPin" type="password" inputmode="numeric" placeholder="••••" style="width:100%;padding:10px;border:1px solid var(--border);border-radius:10px;background:var(--panel-2);color:var(--text);text-align:center;font-size:18px;letter-spacing:6px" />
    <button class="btn btn-primary btn-block" style="margin-top:12px" onclick="submitLock()">فتح</button>
    <div id="lockError" class="login-error"></div>
  </div>
</div>

<!-- ===== App Shell (built by renderShell in app.js) ===== -->
<div id="app" class="app hidden"></div>

<!-- ===== Modals ===== -->
<div id="modalRoot"></div>
<div id="printRoot"></div>
<div id="toastRoot"></div>
<div id="offlineBar" class="offline-bar hidden">⚠️ أنت غير متصل — تعمل في وضع أوفلاين</div>

  <script src="core-lib.js"></script>
  <script src="app.js"></script>
  <script src="invoice-screen.js"></script>
  <script src="accounting-ext.js"></script>
  <script src="accounting-core2.js"></script>
</body>
</html>
